services:
  db:
    image: mysql:8.0
    container_name: essentia_mysql_dev
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: essentia_todo
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  nosql:
    image: mongo:6.0
    container_name: essentia_mongo_dev
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: essentia_redis_dev
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: essentia_backend_dev
    restart: on-failure
    ports:
      - "8888:8888"
    depends_on:
      - db
      - nosql
      - redis
    environment:
      - PORT=8888
      - DATABASE_URL=mysql://user:password@db:3306/essentia_todo
      - MONGO_URL=mongodb://admin:password@nosql:27017/essentia_todo?authSource=admin
      - REDIS_URL=redis://redis:6379

volumes:
  mysql_data:
  mongo_data:
  redis_data:
