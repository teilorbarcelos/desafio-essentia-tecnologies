services:
  db:
    image: mysql:8.0
    container_name: techx_mysql_dev
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: techx_todo
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  nosql:
    image: mongo:6.0
    container_name: techx_mongo_dev
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: techx_redis_dev
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: techx_backend_dev
    restart: on-failure
    ports:
      - "8888:8888"
    depends_on:
      - db
      - nosql
      - redis
    environment:
      - PORT=8888
      - HOST=0.0.0.0
      - DATABASE_URL=mysql://user:password@db:3306/techx_todo
      - MONGO_URL=mongodb://admin:password@nosql:27017/techx_todo?authSource=admin
      - REDIS_URL=redis://redis:6379

volumes:
  mysql_data:
  mongo_data:
  redis_data:
